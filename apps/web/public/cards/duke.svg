<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <title>Duke</title>

  <!-- outer white border + purple card -->
  <rect x="0" y="0" width="400" height="600" rx="22" fill="#ffffff"/>
  <rect x="12" y="12" width="376" height="576" rx="18" fill="#6b3a73"/>

  <!-- emblem: ring + thick star + inner badge -->
  <g transform="translate(200 280)">
    <circle cx="0" cy="0" r="72" fill="none" stroke="#e7a8c9" stroke-width="8"/>
    <path d="M0 -88 L26.9 -37 L83.7 -27.2 L43.5 14.1 L51.7 71.2 L0 45.8 L-51.7 71.2 L-43.5 14.1 L-83.7 -27.2 L-26.9 -37 Z" fill="#e7a8c9"/>
    <circle cx="0" cy="0" r="24" fill="#6b3a73"/>
    <path d="M0 -20 L6.11 -8.41 L19.02 -6.18 L9.89 3.21 L11.76 16.18 L0 10.4 L-11.76 16.18 L-9.89 3.21 L-19.02 -6.18 L-6.11 -8.41 Z" fill="#e7a8c9"/>
  </g>

  <!-- title -->
  <text x="200" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="700" font-size="26" fill="#ffffff" letter-spacing="3">DUKE</text>

  <!-- actions -->
  <text x="200" y="518" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="15" fill="#e9d4ee" letter-spacing="2">DRAW THREE COINS</text>
  <text x="200" y="540" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="400" font-size="15" fill="#e9d4ee" letter-spacing="2">BLOCK FOREIGN AID</text>
</svg>
